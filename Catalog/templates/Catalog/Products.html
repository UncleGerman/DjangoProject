{% extends "footer.html" %}
{% block list %}
<style type="text/css">
	.content img {
		height: 150px;
		width: 150px;
	}
	.item {
		margin: 0% 0% 5%;
		text-align: center;
	}
</style>
<div class="content">
	<div class="container">
		<div class="row">
			{% for post in object_list %}
			<div class="col-md-3 item">
				<a href="/Catalog/{{post.id}}">
					<img src="{{post.image.url}}">
					<h4>
						{{post.title}}
					</h4>
					<h5>
						{{post.date|date:"d-m-Y"}}
					</h5>
				</a>
			</div>	
			{% endfor %}
		</div>
	</div>
</div>
{% endblock %}
