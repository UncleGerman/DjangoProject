<!DOCTYPE html>
<html leng="ru">
<head>
	<meta charset="utf-8">
	<title>Bad Code Studio</title>
	{% load static %}
	<link rel="shortcut icon" href="{% static 'img/icon.png' %}" type="image/x-icon">
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
	<link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
	<style type="text/css">
		.nav_cotalog {
			position: absolute;
			margin-top: 5%;
			left: 0;
			top: 0;
			width: 20%;
		}
	</style>
	<div class="sticky-top">
		<nav class="nav_top navbar navbar-expand-lg navbar-dark">
			<a class="navbar-brand" href="#">
				<img src="{% static 'img/logo.png'%}">
			</a>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav mr-auto">
					<li class="nav-item">
						<a class="nav-link" href="#">
							Home
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="#">
							About Us
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="#">
							Product
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="#">
							Link
						</a>
					</li>
				</ul>
			</div>
			<div class="icon">
				<a href="#">
					<img src="{% static 'img/favorite.png'%}">
				</a>
				<a href="#">
					<img src="{% static 'img/account.png'%}">
				</a>
			</div>
		</nav>
		<nav class="nav_top navbar navbar-dark">
			<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarToggleExternalContent" aria-controls="navbarToggleExternalContent" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="panel-collapse collapse nav_cotalog" id="navbarToggleExternalContent">
				<div class="bg-dark p-4">
					<h4 class="text-white">Collapsed content</h4>
					<span class="text-muted">Toggleable via the navbar brand.</span>
					<ul>
						<li>
							<a href="#">
								Product
							</a>
						</li>
						<li>
							<a href="#">

							</a>
						</li>
						<li>

							</a>
						</li>
						<li>
							<a href="#">
								Product
							</a>
						</li>
						<li>
							<a href="#">
								Product
							</a>
						</li>
					</ul>
				</div>
			</div>
			<form class="form-inline my-2 my-lg-0">
				<input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
				<button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
			</form>
		</nav>
	</div>

{% block content %}
{% endblock %}
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
	<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js" integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI" crossorigin="anonymous" ></script>
